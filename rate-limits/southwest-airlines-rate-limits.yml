specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Southwest Airlines
providerId: southwest-airlines
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Fortune 500
  - Airlines
  - Aviation
  - Travel
  - Rate Limiting
description: Southwest Airlines does not publish rate-limit documentation for any
  third-party-accessible API. The www.southwest.com/api endpoints are internal /
  first-party. Any limits applied to partner integrations (NDC, loyalty, distribution)
  are governed by the partnership contract rather than a public throttling policy.
sources:
  - https://www.southwest.com/
notes: No public rate-limit documentation. Limits, if any, are contract-bound.
responseCodes:
  throttled: 429
limits:
  - name: Partner / Contract-Bound Limits
    scope: contract
    metric: varies
    limit: see partnership agreement
    notes: Numbers, windows, and burst behavior are negotiated per agreement and
      not publicly documented.
policies:
  - name: Contractual Throttling
    description: Throttling and quota enforcement, where present, are defined in
      the partner integration agreement; no general-purpose backoff or header
      contract is published.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
