provider: Southwest Airlines
providerId: southwest-airlines
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Fortune 500
  - Airlines
  - Aviation
  - Travel
description: Southwest Airlines does not operate a public, self-serve developer API
  program. The internal endpoints under www.southwest.com/api and the in-flight
  network under getconnected.southwestwifi.com are consumer-facing and not licensed
  to third parties. Any programmatic integration (corporate travel, GDS/NDC
  distribution, loyalty tie-ins) is negotiated through Southwest's distribution and
  partnership teams under custom agreements.
sources:
  - https://www.southwest.com/
  - https://www.southwest.com/help/contact-us
notes: No published pricing page or developer plan documentation exists. Access is
  partner/contract-only; pricing is commercially negotiated.
plans:
  - id: southwest-airlines-contact-sales
    name: Contact Sales
    type: enterprise
    description: All Southwest Airlines API access (NDC distribution, loyalty
      integration, travel-management partner connections) is established via direct
      commercial agreement. Terms, volume, and fees are not publicly disclosed.
    entries:
      - label: Custom Partnership Agreement
        name: custom_agreement
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Contractual Distribution Agreement
      - name: Custom SLA
      - name: Negotiated Volume
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
