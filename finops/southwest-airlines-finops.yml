meters:
  - name: contracted_partnership
    description: Placeholder meter; actual billable units are defined per partnership
      agreement (e.g. distribution segments, loyalty transactions).
    unit: varies
    aggregation: sum
principles:
  - name: Visibility
    description: No public usage API or cost dashboard. Visibility relies on contract
      reporting deliverables agreed in the partnership.
  - name: Allocation
    description: Spend on Southwest partnership integrations is allocated against
      the contracting business unit (corporate travel, distribution, loyalty).
  - name: Optimization
    description: Optimization is contractual rather than technical — renegotiating
      volume tiers, segment commitments, or distribution mix.
  - name: Accountability
    description: Owned by the contracting team's procurement / vendor manager;
      Southwest does not expose self-serve cost controls.
notes: No public per-call billing or FinOps surface; entry exists for catalog
  completeness only.
